name: Transfer Reminders

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC daily (09:00 Ireland/Spain in winter, 10:00 in summer — close enough)
  workflow_dispatch:        # Allow manual trigger for testing

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: npm install nodemailer

      - name: Check and send reminder
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          node - << 'EOF'
          const nodemailer = require('nodemailer');
          (async () => {

          // ── Schedule (key=period, values=amounts per account) ──────────────
          const SCHEDULE = [
            {period:"2026-06",naranja:300,savingsie:150,bunq:300,moco:200,brokering:100,xtb:200,lightyear:0},
{period:"2026-07",naranja:250,savingsie:150,bunq:300,moco:200,brokering:150,xtb:200,lightyear:0},
{period:"2026-08",naranja:200,savingsie:150,bunq:300,moco:200,brokering:200,xtb:200,lightyear:0},
{period:"2026-09",naranja:150,savingsie:150,bunq:300,moco:200,brokering:250,xtb:200,lightyear:0},
{period:"2026-10",naranja:100,savingsie:150,bunq:300,moco:200,brokering:300,xtb:200,lightyear:0},
{period:"2026-11",naranja:50,savingsie:150,bunq:300,moco:200,brokering:350,xtb:200,lightyear:0},
{period:"2026-12",naranja:0,savingsie:150,bunq:300,moco:200,brokering:400,xtb:200,lightyear:0},
{period:"2027-01",naranja:0,savingsie:100,bunq:300,moco:200,brokering:400,xtb:250,lightyear:0},
{period:"2027-02",naranja:0,savingsie:50,bunq:300,moco:200,brokering:400,xtb:250,lightyear:50},
{period:"2027-03",naranja:0,savingsie:0,bunq:300,moco:200,brokering:400,xtb:300,lightyear:50},
{period:"2027-04",naranja:0,savingsie:0,bunq:250,moco:200,brokering:400,xtb:300,lightyear:100},
{period:"2027-05",naranja:0,savingsie:0,bunq:200,moco:200,brokering:400,xtb:350,lightyear:100},
{period:"2027-06",naranja:0,savingsie:0,bunq:150,moco:200,brokering:400,xtb:350,lightyear:150},
{period:"2027-07",naranja:0,savingsie:0,bunq:100,moco:200,brokering:400,xtb:400,lightyear:150},
{period:"2027-08",naranja:0,savingsie:0,bunq:50,moco:200,brokering:400,xtb:400,lightyear:200},
{period:"2027-09",naranja:0,savingsie:0,bunq:0,moco:200,brokering:400,xtb:450,lightyear:200},
{period:"2027-10",naranja:0,savingsie:0,bunq:0,moco:150,brokering:400,xtb:450,lightyear:250},
{period:"2027-11",naranja:0,savingsie:0,bunq:0,moco:100,brokering:400,xtb:500,lightyear:250},
{period:"2027-12",naranja:0,savingsie:0,bunq:0,moco:50,brokering:400,xtb:500,lightyear:300},
{period:"2028-01",naranja:0,savingsie:0,bunq:0,moco:0,brokering:400,xtb:550,lightyear:300},
          ];

          const TRANSFERS = [
            { id:'bunq',      label:'Bunq',       from:'Revolut Personal', to:'Bunq',       day:1,         key:'bunq' },
            { id:'moco',      label:'MoCo',       from:'Revolut Personal', to:'MoCo',       day:1,         key:'moco' },
            { id:'xtb',       label:'XTB',        from:'Revolut Personal', to:'XTB',        day:1,         key:'xtb' },
            { id:'savingsie', label:'Savings IE', from:'Revolut Personal', to:'Savings IE', day:'lastWed', key:'savingsie' },
            { id:'brokering', label:'Broker ING', from:'Cuenta nómina',    to:'Broker ING', day:2,         key:'brokering' },
            { id:'naranja',   label:'Naranja',    from:'Cuenta nómina',    to:'Naranja',    day:10,        key:'naranja' },
          ];

          function getLastWed(year, month) {
            const last = new Date(year, month, 0);
            const dow = last.getDay();
            const diff = (dow >= 3) ? dow - 3 : dow + 4;
            return last.getDate() - diff;
          }

          function getPeriod(year, month) {
            return `${year}-${String(month).padStart(2,'0')}`;
          }

          function getRow(period) {
            return SCHEDULE.find(r => r.period === period) || null;
          }

          function getPrevRow(period) {
            const idx = SCHEDULE.findIndex(r => r.period === period);
            return idx > 0 ? SCHEDULE[idx-1] : null;
          }

          // Find which transfers need reminding today
          const today = new Date();
          const todayDay = today.getDate();
          const todayMonth = today.getMonth() + 1;
          const todayYear = today.getFullYear();

          // We check: is today the reminder date for any transfer?
          // Reminder dates relative to current month's transfer date:
          // Always 2 days before the transfer date.
          // For day<=2 the reminder falls in the previous month.

          const reminders = [];

          for (const t of TRANSFERS) {
            let transferYear = todayYear;
            let transferMonth = todayMonth;

            let isReminderDay = false;

            if (t.day === 'lastWed') {
              const lw = getLastWed(todayYear, todayMonth);
              if (todayDay === lw - 2) isReminderDay = true;
            } else if (t.day <= 2) {
              // Reminder falls in previous month: last day of prev month - (2 - t.day)
              const lastDay = new Date(todayYear, todayMonth, 0).getDate();
              const remDay  = lastDay - (2 - t.day);
              if (todayDay === remDay) {
                isReminderDay = true;
                // Transfer is next month
                transferMonth = todayMonth === 12 ? 1 : todayMonth + 1;
                transferYear  = todayMonth === 12 ? todayYear + 1 : todayYear;
              }
            } else {
              if (todayDay === t.day - 2) isReminderDay = true;
            }

            if (!isReminderDay) continue;

            // Determine which month's schedule applies to this transfer
            const period = getPeriod(transferYear, transferMonth);
            const row  = getRow(period);
            const prev = getPrevRow(period);
            if (!row) continue;

            const amount     = row[t.key]  || 0;
            const prevAmount = prev ? (prev[t.key] || 0) : amount;
            const changed    = amount !== prevAmount;

            reminders.push({ t, amount, prevAmount, changed, period });
          }

          if (reminders.length === 0) {
            console.log('No reminders due today.');
            process.exit(0);
          }

          // Group: changed-only items are the focus, but include all due today
          const changedItems = reminders.filter(r => r.changed);
          const unchangedItems = reminders.filter(r => !r.changed);

          // Build email
          let lines = [];
          if (changedItems.length > 0) {
            lines.push('The following transfers need updating:');
            lines.push('');
            for (const r of changedItems) {
              const diff = r.amount - r.prevAmount;
              lines.push(`  ${r.t.from} → ${r.t.to}`);
              lines.push(`  Amount: €${r.amount} (${diff > 0 ? '+' : ''}${diff} vs last month)`);
              lines.push('');
            }
          }
          if (unchangedItems.length > 0) {
            lines.push('Unchanged (no action needed):');
            for (const r of unchangedItems) {
              lines.push(`  ${r.t.from} → ${r.t.to}: €${r.amount}`);
            }
            lines.push('');
          }

          const subject = changedItems.length > 0
            ? `Transfer reminder — ${changedItems.length} amount${changedItems.length>1?'s':''} to update`
            : `Transfer reminder — no changes this month`;

          const text = lines.join('\n');

          // Send via Gmail SMTP
          const transporter = nodemailer.createTransport({
            service: 'gmail',
            auth: { user: 'glau00@gmail.com', pass: process.env.GMAIL_APP_PASSWORD }
          });

          await transporter.sendMail({
            from: 'glau00@gmail.com',
            to:   'glau00@gmail.com',
            subject,
            text
          });

          console.log('Email sent:', subject);
          })();
          EOF
